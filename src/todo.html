<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src 'self' data: file:">
<title>To-Do</title>
<style>
* { box-sizing: border-box; }

:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface-alt: #ececef;
  --text: #18181b;
  --muted: #6b6b70;
  --subtle: #9b9ba0;
  --border: rgba(0, 0, 0, 0.08);
  --accent: #d97757;
  --accent-hover: #c4684a;
  --completed: #16803c;
  --scroll-thumb: rgba(0, 0, 0, 0.15);
  --scroll-thumb-hover: rgba(0, 0, 0, 0.25);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1f;
    --surface: #232327;
    --surface-alt: #18181b;
    --text: #f4f4f5;
    --muted: #a1a1aa;
    --subtle: #71717a;
    --border: rgba(255, 255, 255, 0.08);
    --completed: #22c55e;
    --scroll-thumb: rgba(255, 255, 255, 0.1);
    --scroll-thumb-hover: rgba(255, 255, 255, 0.2);
  }
}

html, body {
  height: 100%;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body { user-select: none; }

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-width: 0;
}

.header {
  flex: 0 0 auto;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

h1 {
  margin: 0 0 14px;
  font-size: 20px;
  line-height: 1.2;
  font-weight: 700;
  letter-spacing: 0;
}

.add-task-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-alt);
  color: var(--text);
  font: inherit;
  font-size: 13px;
  outline: none;
  user-select: text;
}

.add-task-input:focus {
  border-color: var(--accent);
  background: var(--surface);
}

.add-task-input::placeholder {
  color: var(--subtle);
}

.content {
  flex: 1 1 auto;
  overflow-y: auto;
  min-height: 0;
  padding: 16px 18px 20px;
}

.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 3px; }
.content::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); }

.date-group {
  margin: 0 0 20px;
}

.date-title {
  margin: 0 0 10px;
  padding: 0 2px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  line-height: 1.3;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.tasks {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.task-item {
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  overflow: hidden;
  max-height: 200px;
  transition: opacity 0.4s ease, max-height 0.4s ease 0.1s, padding 0.4s ease 0.1s,
    margin 0.4s ease 0.1s, border-width 0.4s ease 0.1s;
}

.task-item.completed {
  opacity: 0.65;
}

.task-item.completed .task-content {
  text-decoration: line-through;
  text-decoration-color: var(--muted);
}

.task-item.fade-out {
  opacity: 0;
  max-height: 0;
  padding-top: 0;
  padding-bottom: 0;
  margin-bottom: 0;
  border-width: 0;
}

.task-checkbox {
  flex: 0 0 auto;
  width: 18px;
  height: 18px;
  margin-top: 2px;
  border: 2px solid var(--border);
  border-radius: 4px;
  background: var(--surface-alt);
  cursor: pointer;
  position: relative;
}

.task-checkbox:hover {
  border-color: var(--accent);
}

.task-checkbox.checked {
  background: var(--completed);
  border-color: var(--completed);
}

.task-checkbox.checked::after {
  content: "✓";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
}

.task-main {
  flex: 1 1 auto;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.task-content {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: pre-wrap;
  word-break: break-word;
  font-weight: 500;
  line-height: 1.45;
  color: var(--text);
  cursor: text;
}

.task-content-input {
  width: 100%;
  min-width: 0;
  padding: 2px 6px;
  border: 1px solid var(--accent);
  border-radius: 5px;
  outline: none;
  background: var(--surface-alt);
  color: var(--text);
  font: inherit;
  font-weight: 500;
  line-height: 1.45;
  user-select: text;
}

.task-deadline-row {
  display: flex;
  align-items: center;
  gap: 4px;
  min-height: 20px;
}

.task-deadline-text {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.4;
}

.task-deadline-text.muted {
  color: var(--subtle);
}

.task-deadline-text.overdue-text {
  color: #dc2626;
  font-weight: 600;
}

@media (prefers-color-scheme: dark) {
  .task-deadline-text.overdue-text {
    color: #f87171;
  }
}

.task-deadline-edit-btn {
  min-width: unset;
  width: 18px;
  height: 18px;
  padding: 0;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--subtle);
  font-size: 11px;
  cursor: pointer;
  line-height: 1;
  opacity: 0;
  transition: opacity 0.15s;
}

.task-item:hover .task-deadline-edit-btn {
  opacity: 1;
}

.task-deadline-edit-btn:hover {
  background: var(--surface-alt);
  color: var(--accent);
}

.task-deadline-picker {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}

.task-deadline-input {
  padding: 2px 6px;
  border: 1px solid var(--accent);
  border-radius: 5px;
  outline: none;
  background: var(--surface-alt);
  color: var(--text);
  font: inherit;
  font-size: 12px;
  line-height: 1.4;
  user-select: text;
  color-scheme: light dark;
}

.task-deadline-clear-btn,
.task-deadline-cancel-btn {
  min-width: unset;
  height: 22px;
  padding: 0 6px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--surface-alt);
  color: var(--muted);
  font: inherit;
  font-size: 11px;
  cursor: pointer;
}

.task-deadline-clear-btn:hover {
  background: var(--surface-alt);
  color: #dc2626;
  border-color: #dc2626;
}

.task-deadline-cancel-btn:hover {
  background: var(--surface-alt);
  color: var(--text);
}

.task-item.overdue {
  border-color: rgba(220, 38, 38, 0.3);
}

.task-delete {
  position: absolute;
  top: 8px;
  right: 8px;
  min-width: 22px;
  width: 22px;
  height: 22px;
  padding: 0;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--subtle);
  font-size: 17px;
  font-weight: 500;
  line-height: 20px;
  cursor: pointer;
}

.task-delete:hover {
  background: var(--surface-alt);
  color: var(--text);
}

.empty {
  height: 100%;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: var(--muted);
  gap: 6px;
  padding: 24px;
}

.empty-title {
  color: var(--text);
  font-weight: 700;
  font-size: 15px;
}

.empty-hint {
  max-width: 260px;
  line-height: 1.45;
  color: var(--muted);
}

.hidden { display: none !important; }
</style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 id="title">To-Do</h1>
      <input
        type="text"
        id="add-task-input"
        class="add-task-input"
        placeholder="Add a task..."
      />
    </header>
    <main id="content" class="content" aria-live="polite"></main>
  </div>
  <script src="./todo-renderer.js"></script>
</body>
</html>
